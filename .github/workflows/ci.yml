name: CI / Release / Publish

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major, prerelease]

permissions:
  contents: write    # for checkout/push/tag
  id-token: write    # if you ever want to sign packages

env:
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  test:
    name: Test matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      
      - name: Install native dependencies
        run: npm rebuild oxc-parser || yarn add oxc-parser --force

      - name: Clean pnpm store
        run: pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Lint
        # Static check — run once on the lowest supported Node.
        if: matrix.node-version == 22
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  build:
    name: Build module
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js 22
        # Node 22+ ensures oxc-parser native binding is available
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Build module
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7

  release:
    name: Release & Publish
    needs: build
    runs-on: ubuntu-latest

    # only on main branch or manual dispatch
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: prod

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Lint & unit tests
        run: |
          pnpm lint
          pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Determine release type
        id: determine
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            BODY=$(git log -1 --pretty=%B)
            if echo "$BODY" | grep -qE "BREAKING CHANGE|!:"; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif echo "$BODY" | grep -qE "^feat"; then
              echo "type=minor" >> $GITHUB_OUTPUT
            else
              echo "type=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump version (no tag)
        id: bump
        run: |
          NEW=$(npm version "${{ steps.determine.outputs.type }}" --no-git-tag-version)
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "version_number=${NEW#v}" >> $GITHUB_OUTPUT

      # Only write the changelog file here. `--release` would bump the version
      # AND commit/tag, double-bumping on top of the explicit "npm version" step
      # above and desyncing the published version from the tag/commit. Versioning
      # is owned solely by the bump step; committing/tagging is done below.
      - name: Update changelog
        run: pnpm exec changelogen --output CHANGELOG.md

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

      # Publish to npm FIRST: it is the source of truth and the step most likely
      # to fail (auth/network). Tagging and pushing only after a successful
      # publish keeps git and npm in sync and prevents the tag-collision /
      # version-drift that broke earlier re-runs. An already-published version
      # is treated as success so re-runs are idempotent.
      - name: Publish to npm (latest)
        run: |
          VER="${{ steps.bump.outputs.version_number }}"
          if pnpm publish --access public --no-git-checks; then
            echo "Published @maistik/nuxt-pdf@$VER"
          elif [ "$(npm view "@maistik/nuxt-pdf@$VER" version 2>/dev/null)" = "$VER" ]; then
            echo "Version $VER already on npm — treating as success."
          else
            echo "::error::npm publish failed for $VER (check NPM_TOKEN validity/permissions)"
            exit 1
          fi

      - name: Commit, tag & push release
        run: |
          VER="${{ steps.bump.outputs.version_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): v$VER [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:main
          # Annotated tag (so it is a real tag object) + an explicit tag push.
          # `--follow-tags` only pushes annotated tags, and lightweight tags are
          # skipped entirely — which previously left the tag off the remote.
          if git rev-parse "v$VER" >/dev/null 2>&1; then
            echo "Tag v$VER already exists locally — skipping creation."
          else
            git tag -a "v$VER" -m "Release v$VER"
          fi
          git push origin "refs/tags/v$VER" || echo "Tag v$VER already on remote."

      # gh release create is idempotent-friendly: skip if the release already
      # exists (e.g. on a re-run) instead of hard-failing.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.bump.outputs.version_number }}"
          if gh release view "v$VER" >/dev/null 2>&1; then
            echo "Release v$VER already exists — skipping."
          else
            gh release create "v$VER" \
              --title "Release v$VER" \
              --notes "## Changes
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

          ## Installation
          \`\`\`bash
          npm install @maistik/nuxt-pdf@$VER
          \`\`\`"
          fi

      - name: Release summary
        run: |
          echo "## 🚀 Released v${{ steps.bump.outputs.version_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ steps.determine.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **npm**: ✅ latest" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release**: ✅ created" >> $GITHUB_STEP_SUMMARY
